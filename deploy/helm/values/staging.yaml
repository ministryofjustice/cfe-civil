# Default values for cfe-civil staging
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 5

resources:
  limits:
    cpu: 500m
    memory: 500Mi
  requests:
    cpu: 100m
    memory: 125Mi

ingress:
  className: modsec-non-prod
  hosts:
    - cfe-civil-staging.cloud-platform.service.justice.gov.uk
  annotations:
    external-dns.alpha.kubernetes.io/set-identifier: "cfe-civil-cfe-civil-staging-green"
    external-dns.alpha.kubernetes.io/aws-weight: "100"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecDefaultAction "phase:2,pass,log,tag:github_team=laa-apply-for-legal-aid,tag:namespace=cfe-civil-staging"

deploy:
  host: cfe-civil-staging.cloud-platform.service.justice.gov.uk

legalFrameworkApi:
  host: http://legal-framework-api.legal-framework-api-production.svc.cluster.local

sentry:
  enabled: enabled

threshold:
  futureFile: ''

branch_builder:
  enabled: false
  database_name: null
